<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fleet Monitor — Greece</title>
<style>
  /* ---- Solarized palette (accents shared across light/dark) ---- */
  :root {
    --yellow:#b58900; --orange:#cb4b16; --red:#dc322f; --magenta:#d33682;
    --violet:#6c71c5; --blue:#268bd2; --green:#859900; --cyan:#2aa198;
    --radius:10px;
  }
  /* Dark = Solarized base03/base02/base0/base1 ... */
  html.theme-dark {
    --bg:#002b36; --panel:#073642; --panel2:#0a3a45; --raised:#08313b;
    --text:#93a1a1; --text2:#839496; --muted:#586e75; --border:#0d4250;
    --shadow:0 1px 3px rgba(0,0,0,.45);
  }
  /* Light = Solarized base3/base2/base00/base01 ... */
  html.theme-light {
    --bg:#fdf6e3; --panel:#fffbf0; --panel2:#eee8d5; --raised:#fbf3df;
    --text:#586e75; --text2:#657b83; --muted:#93a1a1; --border:#e3dcc4;
    --shadow:0 1px 3px rgba(101,123,131,.18);
  }

  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    transition:background .4s ease,color .4s ease;
  }
  a { color:var(--blue); }

  /* ---- Top bar ---- */
  header {
    position:sticky; top:0; z-index:5; display:flex; align-items:center;
    gap:18px; padding:12px 20px; background:var(--panel);
    border-bottom:1px solid var(--border); box-shadow:var(--shadow);
  }
  header h1 { font-size:15px; font-weight:600; margin:0; color:var(--text); letter-spacing:.3px; }
  header h1 .sub { color:var(--muted); font-weight:400; }
  .summary { display:flex; gap:14px; align-items:center; flex:1; flex-wrap:wrap; font-size:13px; }
  .summary .stat { color:var(--text2); }
  .summary .stat b { color:var(--text); font-weight:600; }
  .right { display:flex; align-items:center; gap:12px; margin-left:auto; }
  .updated { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:7px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); display:inline-block; }
  .dot.live { background:var(--green); }
  .dot.pulse { animation:pulse .8s ease; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(133,153,0,.6);} 100%{box-shadow:0 0 0 7px rgba(133,153,0,0);} }
  button.theme {
    background:var(--raised); color:var(--text2); border:1px solid var(--border);
    border-radius:7px; padding:5px 11px; font-size:12px; cursor:pointer;
  }
  button.theme:hover { color:var(--text); border-color:var(--muted); }

  /* ---- Connection banner ---- */
  #banner {
    display:none; padding:9px 20px; font-size:13px; font-weight:600;
    background:var(--red); color:#fdf6e3; text-align:center;
  }
  #banner.warn { background:var(--yellow); color:#002b36; }
  #banner.show { display:block; }

  /* ---- Grid ---- */
  main { padding:20px; }
  .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); }

  /* ---- Card ---- */
  .card {
    background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--muted);
    border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
    transition:border-color .25s ease,opacity .25s ease;
  }
  .card.present        { border-left-color:var(--green); }
  .card.frontseat_only { border-left-color:var(--yellow); }
  .card.offline        { border-left-color:var(--red); opacity:.72; }

  .card-head { display:flex; align-items:center; gap:10px; padding:13px 15px 9px; }
  .card-head .name { font-size:16px; font-weight:600; color:var(--text); }
  .card-head .id { font-size:12px; color:var(--muted); }
  .pill {
    margin-left:auto; font-size:11px; font-weight:700; letter-spacing:.4px;
    padding:3px 9px; border-radius:20px; text-transform:uppercase; white-space:nowrap;
  }
  .pill.present        { background:rgba(133,153,0,.18);  color:var(--green); }
  .pill.frontseat_only { background:rgba(181,137,0,.20);  color:var(--yellow); }
  .pill.offline        { background:rgba(220,50,47,.18);  color:var(--red); }

  .card-body { padding:4px 15px 14px; }
  .row { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; }
  .row .label { color:var(--muted); width:74px; flex:none; }
  .row .val { color:var(--text); }
  .mono { font-variant-numeric:tabular-nums; }

  .mode { font-weight:700; letter-spacing:.3px; }
  .mode.AUTO{color:var(--green);} .mode.HOLD{color:var(--cyan);} .mode.MANUAL{color:var(--orange);}
  .mode.NO_HELM{color:var(--muted);} .mode.ALLSTOP{color:var(--violet);}
  .mode.FAILSAFE{color:var(--red);} .mode.RC_UNKNOWN{color:var(--yellow);}

  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .badge {
    font-size:10.5px; font-weight:700; letter-spacing:.4px; padding:2px 7px;
    border-radius:5px; text-transform:uppercase;
  }
  .badge.mission { background:rgba(38,139,210,.18); color:var(--blue); }
  .badge.low     { background:rgba(220,50,47,.18);  color:var(--red); }
  .badge.stale   { background:rgba(181,137,0,.20);  color:var(--yellow); }
  .badge.override{ background:rgba(203,75,22,.20);  color:var(--orange); }
  .badge.fault   { background:rgba(108,113,196,.20);color:var(--violet); }
  .badge.notele  { background:transparent; color:var(--muted); border:1px dashed var(--border); }

  .link-dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .quality-good{background:var(--green);} .quality-mid{background:var(--yellow);} .quality-bad{background:var(--red);}

  .more {
    margin-top:11px; border-top:1px solid var(--border); padding-top:9px;
    display:none; grid-template-columns:1fr 1fr; gap:3px 16px; font-size:12px;
  }
  .more.open { display:grid; }
  .more .k { color:var(--muted); }
  .more .v { color:var(--text2); text-align:right; }
  .expand {
    margin-top:9px; font-size:12px; color:var(--blue); cursor:pointer; user-select:none;
    background:none; border:none; padding:0;
  }
  .expand:hover { text-decoration:underline; }

  /* ---- Tabs + view switching ---- */
  .tabs { display:flex; gap:4px; }
  .tab {
    background:none; border:1px solid transparent; border-radius:7px;
    padding:5px 13px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer;
  }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--text); background:var(--raised); border-color:var(--border); }
  .view { display:none; }
  .view.active { display:block; }

  /* ---- Radio: shore panel ---- */
  .shore-panel {
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px 18px; margin-bottom:18px;
  }
  .shore-panel h2 {
    margin:0 0 12px; font-size:14px; font-weight:600; color:var(--text);
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .shore-stats { display:flex; flex-wrap:wrap; gap:14px 30px; }
  .shore-stats .s { font-size:12px; color:var(--muted); }
  .shore-stats .s b { display:block; font-size:17px; color:var(--text); font-weight:600;
    font-variant-numeric:tabular-nums; margin-top:2px; }
  .shore-stats .s .u { font-size:12px; color:var(--muted); font-weight:400; }
  .tag { font-size:11px; font-weight:700; letter-spacing:.4px; padding:3px 9px;
    border-radius:20px; text-transform:uppercase; }
  .tag.ok    { background:rgba(133,153,0,.18); color:var(--green); }
  .tag.stale { background:rgba(181,137,0,.20); color:var(--yellow); }
  .tag.down  { background:rgba(220,50,47,.18); color:var(--red); }

  /* ---- Radio: station table ---- */
  .rtable { width:100%; border-collapse:collapse; background:var(--panel);
    border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
    box-shadow:var(--shadow); }
  .rtable th, .rtable td { padding:9px 12px; text-align:left; font-size:13px;
    border-bottom:1px solid var(--border); white-space:nowrap; }
  .rtable th { color:var(--muted); font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.4px; }
  .rtable tr:last-child td { border-bottom:none; }
  .rtable td.boat { font-weight:600; color:var(--text); }
  .rtable td.num { font-variant-numeric:tabular-nums; color:var(--text2); }
  .rtable tr.notheard td { color:var(--muted); font-style:italic; }

  /* ---- meter bar (RSSI / TQ) ---- */
  .meter { display:inline-flex; align-items:center; gap:9px; }
  .meter .track { width:62px; height:7px; border-radius:4px; background:var(--panel2);
    overflow:hidden; flex:none; }
  .meter .fill { display:block; height:100%; border-radius:4px; }
  .fill.good{background:var(--green);} .fill.mid{background:var(--yellow);} .fill.bad{background:var(--red);}
  .meter .mv { font-variant-numeric:tabular-nums; color:var(--text2); min-width:54px; }

  .hop { font-size:10.5px; font-weight:700; letter-spacing:.4px; padding:2px 7px;
    border-radius:5px; text-transform:uppercase; }
  .hop.direct { background:rgba(38,139,210,.16); color:var(--blue); }
  .hop.relay  { background:rgba(203,75,22,.20); color:var(--orange); }

  .section-note { margin:18px 0 8px; font-size:13px; color:var(--text2); }
  .section-note code, .muted-note code { background:var(--panel2); padding:1px 5px;
    border-radius:4px; font-size:12px; }
  .muted-note { color:var(--muted); font-size:13px; padding:28px 20px; text-align:center; }

  /* ---- Camera tab ---- */
  .cam-status { font-size:13px; color:var(--text2); margin-bottom:12px; }
  .cam-status .on { color:var(--green); font-weight:600; }
  .cam-status .off { color:var(--red); font-weight:600; }
  .cam-status .cool { color:var(--yellow); font-weight:600; }
  .cam-wrap { display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start; }
  .cam-video { flex:1 1 460px; min-width:300px; }
  .cam-frame { position:relative; width:100%; aspect-ratio:16/9; background:#000;
    border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .cam-frame iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .cam-frame .placeholder { position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; color:var(--muted); font-size:13px; text-align:center; padding:0 16px; }
  .cam-controls { flex:0 0 240px; display:flex; flex-direction:column; gap:16px; }
  .cam-group { background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow); }
  .cam-label { font-size:11px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.4px; margin-bottom:8px; }
  .cam-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ptz-pad { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,40px);
    grid-template-areas:". up ." "left . right" ". down ."; gap:6px; margin-bottom:10px; }
  .ptz { background:var(--raised); color:var(--text); border:1px solid var(--border);
    border-radius:7px; font-size:16px; cursor:pointer; }
  .ptz:hover { border-color:var(--muted); }
  .ptz:active { transform:scale(.94); }
  .ptz-step { grid-area:2/2/3/3; display:flex; align-items:center; justify-content:center;
    font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .seg { background:var(--raised); color:var(--text2); border:1px solid var(--border);
    border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; }
  .seg:hover { color:var(--text); border-color:var(--muted); }
  .seg.active { color:var(--text); border-color:var(--blue); background:rgba(38,139,210,.14); }
  #preset-sel { background:var(--raised); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:5px 8px; font-size:12px; flex:1; min-width:80px; }
  .cam-note { margin-top:12px; font-size:12px; color:var(--muted); min-height:1em; }
  .cam-note.err { color:var(--red); }

  footer { padding:10px 20px 24px; color:var(--muted); font-size:11.5px; }
</style>
</head>
<body>
<header>
  <h1>Fleet Monitor <span class="sub" id="sitename"></span></h1>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="fleet">Fleet</button>
    <button class="tab" data-view="radio">Radio</button>
    <button class="tab" data-view="camera">Camera</button>
  </nav>
  <div class="summary" id="summary"></div>
  <div class="right">
    <div class="updated"><span class="dot" id="livedot"></span><span id="updated">connecting…</span></div>
    <button class="theme" id="themebtn">Theme: Auto</button>
  </div>
</header>
<div id="banner"></div>
<main>
  <section class="view active" id="view-fleet"><div class="grid" id="grid"></div></section>
  <section class="view" id="view-radio"></section>
  <section class="view" id="view-camera">
    <div class="cam-status" id="cam-status">camera: connecting…</div>
    <div class="cam-wrap">
      <div class="cam-video"><div class="cam-frame" id="cam-frame"></div></div>
      <div class="cam-controls">
        <div class="cam-group">
          <div class="cam-label">pan / tilt</div>
          <div class="ptz-pad">
            <button class="ptz" data-pan="0"  data-tilt="1"  style="grid-area:up">▲</button>
            <button class="ptz" data-pan="-1" data-tilt="0"  style="grid-area:left">◀</button>
            <span class="ptz-step" id="ptz-step">15°</span>
            <button class="ptz" data-pan="1"  data-tilt="0"  style="grid-area:right">▶</button>
            <button class="ptz" data-pan="0"  data-tilt="-1" style="grid-area:down">▼</button>
          </div>
          <div class="cam-row" id="step-row">
            <span class="cam-label">step</span>
            <button class="seg" data-step="5">5°</button>
            <button class="seg active" data-step="15">15°</button>
            <button class="seg" data-step="30">30°</button>
          </div>
        </div>
        <div class="cam-group">
          <div class="cam-label">spotlight</div>
          <div class="cam-row">
            <button class="seg" data-light="on">On</button>
            <button class="seg" data-light="off">Off</button>
          </div>
          <div class="cam-label" style="margin-top:10px">night vision (IR)</div>
          <div class="cam-row">
            <button class="seg" data-ir="auto">Auto</button>
            <button class="seg" data-ir="on">On</button>
            <button class="seg" data-ir="off">Off</button>
          </div>
        </div>
        <div class="cam-group">
          <div class="cam-label">presets</div>
          <div class="cam-row">
            <select id="preset-sel"><option value="">—</option></select>
            <button class="seg" id="preset-go">Go</button>
            <button class="seg" id="preset-save">Save…</button>
          </div>
          <div class="cam-row"><button class="seg" id="cam-reload">⟳ reload video</button></div>
        </div>
      </div>
    </div>
    <div class="cam-note" id="cam-note"></div>
  </section>
</main>
<footer id="foot"></footer>

<script>
"use strict";

// ---- config (overridable via URL: ?src=...&poll=2) ----
const params = new URLSearchParams(location.search);
const SRC  = params.get("src")  || "fleet_status.json";
const POLL = (parseFloat(params.get("poll")) || 2) * 1000;

// Camera tab config (defined early so applyView()->camOnView() is safe on load).
// Video = go2rtc WebRTC; control = the lockout-safe cam-control service. Both on
// the same host as this dashboard, own ports. Override via URL params if needed.
const CAM = {
  host:       params.get("camhost")    || location.hostname || "10.1.0.10",
  ctrlPort:   params.get("ctrlport")   || "8082",
  go2rtcPort: params.get("go2rtcport") || "1984",
  src:        params.get("camsrc")     || "tapo",
  step:       15,
};

// ---- theme: auto by time of day (light 07:00–19:00) + manual override ----
const THEMES = ["auto", "light", "dark"];
let themeMode = localStorage.getItem("fm-theme") || "auto";
function autoTheme() { const h = new Date().getHours(); return (h >= 7 && h < 19) ? "light" : "dark"; }
function applyTheme() {
  const eff = themeMode === "auto" ? autoTheme() : themeMode;
  document.documentElement.className = "theme-" + eff;
  document.getElementById("themebtn").textContent =
    "Theme: " + themeMode[0].toUpperCase() + themeMode.slice(1) +
    (themeMode === "auto" ? " (" + eff + ")" : "");
}
document.getElementById("themebtn").onclick = () => {
  themeMode = THEMES[(THEMES.indexOf(themeMode) + 1) % THEMES.length];
  localStorage.setItem("fm-theme", themeMode);
  applyTheme();
};
applyTheme();
setInterval(applyTheme, 60000);   // re-evaluate auto at dusk/dawn while open

// ---- tabs: Fleet / Radio, choice persisted ----
let view = localStorage.getItem("fm-view") || "fleet";
function applyView() {
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.view === view));
  document.querySelectorAll(".view").forEach(v =>
    v.classList.toggle("active", v.id === "view-" + view));
  camOnView();   // lazy-start / stop the camera stream with the tab (hoisted)
}
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  view = t.dataset.view; localStorage.setItem("fm-view", view); applyView();
});
applyView();

// ---- expand state persists across re-renders ----
const expanded = new Set();

// ---- RF quality helpers (Radio tab only) ----
function rssiClass(r){ if(r==null) return "bad"; if(r>=-65) return "good"; if(r>=-80) return "mid"; return "bad"; }
function tqClass(t){ if(t==null) return "bad"; if(t>=200) return "good"; if(t>=120) return "mid"; return "bad"; }
function rssiPct(r){ if(r==null) return 0; return Math.max(0, Math.min(100, (r + 90) / 50 * 100)); }
function meter(pct, cls, label){
  return `<span class="meter"><span class="track"><span class="fill ${cls}" style="width:${pct}%"></span></span>` +
         `<span class="mv">${esc(label)}</span></span>`;
}
function fmtMem(b){ return b != null ? (b / 1048576).toFixed(0) + " MB" : "—"; }

// ---- helpers ----
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c =>
  ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

function qualityClass(rtt, loss) {
  if (rtt == null) return "quality-bad";
  if (rtt > 250 || loss >= 15) return "quality-bad";
  if (rtt > 120 || loss >= 5)  return "quality-mid";
  return "quality-good";
}
const STATE_LABEL = { present:"present", frontseat_only:"frontseat only", offline:"offline" };

function detailRows(f) {
  const items = [
    ["current",  f.curr  != null ? f.curr + " A" : null],
    ["power",    f.power != null ? f.power + " W" : null],
    ["thrust c/a", (f.des_l!=null) ? `L ${f.des_l}/${f.thr_l}  R ${f.des_r}/${f.thr_r}` : null],
    ["rpi temp", f.rpi_t != null ? f.rpi_t + " °C" : null],
    ["encl temp",f.int_t != null ? f.int_t + " °C" : null],
    ["encl kPa", f.int_kpa],
    ["gps",      f.fix ? `${f.fix} · ${f.sats} sats` : null],
    ["hdop",     f.hdop],
    ["position", (f.lat!=null) ? `${f.lat}, ${f.lon}` : null],
    ["speed",    f.spd != null ? f.spd + " m/s" : null],
    ["heading",  f.hdg != null ? f.hdg + "°" : null],
    ["stale",    f.stale],
  ].filter(x => x[1] != null && x[1] !== "");
  return items.map(([k, v]) =>
    `<div class="k">${esc(k)}</div><div class="v mono">${esc(v)}</div>`).join("");
}

function telemetrySection(b) {
  const t = b.telemetry;
  if (!t) {
    const note = b.state === "present" ? "front-seat app not reporting" : "—";
    return `<div class="row"><span class="label">telemetry</span>
            <span class="val"><span class="badge notele">no telemetry</span>
            <span style="color:var(--muted)"> ${esc(note)}</span></span></div>`;
  }
  const f = t.fields || {};
  const stale = !t.fresh;
  const mode = f.mode || "?";
  const badges = [];
  if (f.mission === "true") badges.push(`<span class="badge mission">mission</span>`);
  if (f.mode === "MANUAL" && f.helm === "DRIVE") badges.push(`<span class="badge override">override</span>`);
  if (f.batt === "LOW") badges.push(`<span class="badge low">low batt</span>`);
  if (stale) badges.push(`<span class="badge stale">stale ${esc(t.age_s)}s</span>`);

  const dim = stale ? ' style="opacity:.55"' : "";
  return `
    <div class="row"${dim}><span class="label">mode</span>
      <span class="val"><span class="mode ${esc(mode)}">${esc(mode)}</span>
      ${f.helm && f.helm!=="NONE" ? `<span style="color:var(--muted)"> · helm ${esc(f.helm)}</span>`:""}</span></div>
    <div class="row"${dim}><span class="label">battery</span>
      <span class="val mono">${esc(f.volt!=null?f.volt+" V":"—")}</span></div>
    ${badges.length ? `<div class="badges">${badges.join("")}</div>` : ""}
    <button class="expand" data-boat="${esc(b.name)}">${expanded.has(b.name)?"− less":"+ more"}</button>
    <div class="more ${expanded.has(b.name)?"open":""}">${detailRows(f)}</div>`;
}

function card(b) {
  const up = (b.rungs && b.rungs.uplink) || {};
  const bs = (b.rungs && b.rungs.backseat) || {};
  const linkTxt = up.alive
    ? `${up.rtt_ms!=null?up.rtt_ms+" ms":"—"}${up.loss_pct?`  ·  ${up.loss_pct}% loss`:""}`
    : "unreachable";
  const faultBadge = b.fault_at
    ? `<span class="badge fault">fault: ${esc(b.fault_at)}</span>` : "";
  return `
  <div class="card ${esc(b.state)}">
    <div class="card-head">
      <span class="name">${esc(b.name)}</span><span class="id">${b.id != null ? "#"+esc(b.id) : ""}</span>
      <span class="pill ${esc(b.state)}">${esc(STATE_LABEL[b.state]||b.state)}</span>
    </div>
    <div class="card-body">
      <div class="row"><span class="label">link</span>
        <span class="link-dot ${qualityClass(up.rtt_ms, up.loss_pct)}"></span>
        <span class="val mono">${esc(linkTxt)}</span></div>
      <div class="row"><span class="label">backseat</span>
        <span class="link-dot ${bs.alive?"quality-good":"quality-bad"}"></span>
        <span class="val">${bs.alive?"reachable":"unreachable"}</span></div>
      ${faultBadge ? `<div class="badges">${faultBadge}</div>` : ""}
      ${telemetrySection(b)}
    </div>
  </div>`;
}

// ---- Radio tab: shore-radio panel + per-boat station table + unmapped ----
function renderRadio(snap) {
  const el = document.getElementById("view-radio");
  const r = snap.radio || {};
  if (!r.enabled) {
    el.innerHTML = `<div class="muted-note">Radio subsystem is off. Set
      <code>radio.enabled: true</code> in the site config to pull RF/mesh stats from
      the shore radio.</div>`;
    return;
  }

  let tag, txt;
  if (!r.ok)         { tag = "down";  txt = "API unreachable"; }
  else if (!r.fresh) { tag = "stale"; txt = `stale ${r.age_s}s`; }
  else               { tag = "ok";    txt = "live"; }
  const load = Array.isArray(r.cpu_load) ? r.cpu_load.map(x => Number(x).toFixed(2)).join(" / ") : "—";
  const shore = `
    <div class="shore-panel">
      <h2>Shore radio <span class="tag ${tag}">${esc(txt)}</span>
        <span style="color:var(--muted);font-weight:400;font-size:12px">${esc(r.api_ip||"")} · polled ${esc(r.polled_iso||"?")}</span></h2>
      ${(!r.ok && r.last_error) ? `<div style="color:var(--red);font-size:12px;margin:-4px 0 8px">${esc(r.last_error)}</div>` : ""}
      <div class="shore-stats">
        <div class="s">noise floor<b>${r.noise!=null?esc(r.noise)+' <span class="u">dBm</span>':'—'}</b></div>
        <div class="s">channel<b>${r.oper_chan!=null?esc(r.oper_chan):'—'} <span class="u">${r.oper_freq!=null?'· '+esc(r.oper_freq)+' MHz':''} ${r.chan_width?'· '+esc(r.chan_width)+' MHz BW':''}</span></b></div>
        <div class="s">channel activity<b>${r.activity?'busy':'idle'}</b></div>
        <div class="s">stations heard<b>${r.station_count!=null?esc(r.station_count):'—'} <span class="u">(${esc(r.mapped_count||0)} mapped)</span></b></div>
        <div class="s">cpu load<b style="font-size:14px">${esc(load)} <span class="u">1/5/15m</span></b></div>
        <div class="s">free memory<b>${esc(fmtMem(r.freemem))}</b></div>
      </div>
    </div>`;

  const boats = snap.boats || [];
  const rows = boats.map(b => {
    const r2 = b.radio;
    if (!r2) {
      const note = b.state === "offline" ? "offline — not heard by shore radio" : "not heard";
      return `<tr class="notheard"><td class="boat">${esc(b.name)}</td><td colspan="7">${esc(note)}</td></tr>`;
    }
    const rBar = meter(rssiPct(r2.rssi), rssiClass(r2.rssi), r2.rssi!=null?r2.rssi+" dBm":"—");
    const tBar = meter(r2.tq!=null?r2.tq/255*100:0, tqClass(r2.tq), r2.tq!=null?r2.tq+"/255":"—");
    const ant = Array.isArray(r2.rssi_ant) ? r2.rssi_ant.join(" / ") : "—";
    const hop = r2.hop_status ? `<span class="hop ${esc(r2.hop_status)}">${esc(r2.hop_status)}</span>` : "—";
    const pl = r2.pl_ratio!=null ? (r2.pl_ratio*100).toFixed(1)+"%" : "—";
    const tx = `${r2.tx_retries!=null?r2.tx_retries:"—"} / ${r2.tx_failed!=null?r2.tx_failed:"—"}`;
    return `<tr>
      <td class="boat">${esc(b.name)}</td>
      <td>${rBar}</td>
      <td class="num">${esc(ant)}</td>
      <td class="num">${r2.mcs!=null?esc(r2.mcs):"—"}</td>
      <td>${tBar}</td>
      <td>${hop}</td>
      <td class="num">${esc(pl)}</td>
      <td class="num">${esc(tx)}</td>
    </tr>`;
  }).join("");
  const table = `<table class="rtable"><thead><tr>
    <th>boat</th><th>signal (RSSI)</th><th>antennas</th><th>MCS</th>
    <th>mesh TQ</th><th>hop</th><th>loss</th><th>tx retry / fail</th>
    </tr></thead><tbody>${rows}</tbody></table>`;

  let unmapped = "";
  if (Array.isArray(r.unmapped) && r.unmapped.length) {
    const u = r.unmapped.map(s => `<tr>
      <td class="num">${esc(s.mac)}</td>
      <td class="num">${s.rssi!=null?s.rssi+" dBm":"—"}</td>
      <td class="num">${s.tq!=null?s.tq+"/255":"—"}</td>
      <td class="num">${s.mcs!=null?esc(s.mcs):"—"}</td></tr>`).join("");
    unmapped = `<div class="section-note">Heard but unmapped — add these MACs to
      <code>radio.macs</code> in the site config to attribute them to boats:</div>
      <table class="rtable"><thead><tr><th>MAC</th><th>RSSI</th><th>mesh TQ</th><th>MCS</th></tr></thead>
      <tbody>${u}</tbody></table>`;
  }
  el.innerHTML = shore + table + unmapped;
}

function render(snap) {
  // site label (from the active config: "Greece", "MIT Pavlab", ...)
  const site = snap.site || "";
  document.getElementById("sitename").textContent = site ? "· " + site : "";
  document.title = site ? `Fleet Monitor — ${site}` : "Fleet Monitor";

  // summary bar (Fleet/A+B only — radio-subsystem health lives on the Radio tab)
  const boats = snap.boats || [];
  const present = boats.filter(b => b.state === "present").length;
  const shore = snap.shore_ok ? `<b style="color:var(--green)">up</b>`
                              : `<b style="color:var(--red)">DOWN</b>`;
  document.getElementById("summary").innerHTML =
    `<span class="stat"><b>${present}</b>/${boats.length} present</span>` +
    `<span class="stat"><b>${snap.telemetry_count||0}</b> telemetry fresh</span>` +
    `<span class="stat">shore radio ${shore}</span>`;

  // grid
  document.getElementById("grid").innerHTML = boats.map(card).join("");
  document.querySelectorAll(".expand").forEach(btn => btn.onclick = () => {
    const n = btn.dataset.boat;
    expanded.has(n) ? expanded.delete(n) : expanded.add(n);
    const more = btn.nextElementSibling;
    more.classList.toggle("open");
    btn.textContent = expanded.has(n) ? "− less" : "+ more";
  });

  // radio tab (rendered every tick; cheap, and stays warm behind the fleet view)
  renderRadio(snap);

  document.getElementById("foot").textContent =
    `source: ${SRC} · polling every ${POLL/1000}s · snapshot ${snap.iso||"?"}`;
}

// ---- connection state ----
function setBanner(kind, msg) {
  const el = document.getElementById("banner");
  if (!kind) { el.className = ""; return; }
  el.className = "show" + (kind === "warn" ? " warn" : "");
  el.textContent = msg;
}
function setLive(ok, iso) {
  const dot = document.getElementById("livedot");
  dot.className = "dot" + (ok ? " live pulse" : "");
  setTimeout(() => dot.classList.remove("pulse"), 800);
  document.getElementById("updated").textContent = ok ? `updated ${iso}` : "no data";
}

let lastText = "";
async function tick() {
  try {
    const res = await fetch(SRC + (SRC.includes("?") ? "&" : "?") + "_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const snap = JSON.parse(text);

    // collector running but snapshot gone stale? (ts is epoch seconds)
    const age = Date.now() / 1000 - (snap.ts || 0);
    if (age > Math.max(8, (POLL / 1000) * 4))
      setBanner("warn", `Collector snapshot is ${age.toFixed(0)}s old — collector may be stalled.`);
    else
      setBanner(null);

    if (text !== lastText) { render(snap); lastText = text; }
    setLive(true, snap.iso);
  } catch (e) {
    // fetch failed: this is a LOCAL problem (can't reach the collector), shown
    // distinctly from "a boat is down" — the separation we designed for.
    setBanner("err", "Disconnected from collector (" + e.message + ") — check your link to the Pi.");
    setLive(false);
  }
}
tick();
setInterval(tick, POLL);

// ---- Camera tab ----------------------------------------------------------
function camNote(msg, isErr) {
  const el = document.getElementById("cam-note");
  if (!el) return;
  el.textContent = msg || "";
  el.className = "cam-note" + (isErr ? " err" : "");
}
async function camCtrl(path, method, body) {
  const url = `http://${CAM.host}:${CAM.ctrlPort}${path}`;
  const opt = { method: method || "GET" };
  if (body) { opt.headers = { "Content-Type": "application/json" }; opt.body = JSON.stringify(body); }
  const res = await fetch(url, opt);
  const data = await res.json().catch(() => ({}));
  if (res.status === 503) throw new Error(data.error || "camera cooling down (lockout guard)");
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}
function camPTZ(panDir, tiltDir) {
  camCtrl("/cam/ptz", "POST", { pan: panDir * CAM.step, tilt: tiltDir * CAM.step })
    .then(() => camNote(`moved (${panDir*CAM.step}°, ${tiltDir*CAM.step}°)`))
    .catch(e => camNote(e.message, true));
}
function camSimple(path, body, okMsg) {
  camCtrl(path, "POST", body).then(() => camNote(okMsg)).catch(e => camNote(e.message, true));
}
function camLoadPresets() {
  const sel = document.getElementById("preset-sel");
  if (!sel) return;
  camCtrl("/cam/presets").then(d => {
    const items = (d.result || []);
    sel.innerHTML = '<option value="">—</option>' +
      items.map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join("");
  }).catch(() => {});
}
function camStatus() {
  if (view !== "camera") return;                 // only poll while the tab is open
  const el = document.getElementById("cam-status");
  camCtrl("/cam/status").then(s => {
    let state = s.cooldown ? `<span class="cool">cooling down ${s.cooldown_s}s</span>`
              : s.online   ? `<span class="on">online</span>`
                           : `<span class="off">offline</span>`;
    const name = s.model ? ` · ${esc(s.model)}${s.name ? " ("+esc(s.name)+")" : ""}` : "";
    el.innerHTML = `camera ${state}${name} · ${esc(s.cam_ip || CAM.host)}`;
  }).catch(e => { el.innerHTML = `camera <span class="off">control unreachable</span> — is cam-control running?`; });
}

// Lazy stream: only attach the WebRTC iframe while the Camera tab is visible,
// and tear it down when you leave, so go2rtc isn't streaming to a hidden tab.
function camOnView() {
  const frame = document.getElementById("cam-frame");
  if (!frame) return;
  if (view === "camera") {
    if (!frame.querySelector("iframe")) {
      frame.innerHTML = "";
      const ph = document.createElement("div");          // behind the iframe
      ph.className = "placeholder";
      ph.textContent = "connecting to stream… (needs go2rtc running on the Pi)";
      frame.appendChild(ph);
      const f = document.createElement("iframe");         // on top; clears ph on load
      f.allow = "autoplay; fullscreen";
      f.onload = () => ph.remove();
      f.src = `http://${CAM.host}:${CAM.go2rtcPort}/stream.html?src=${encodeURIComponent(CAM.src)}`;
      frame.appendChild(f);
    }
    camStatus();
    camLoadPresets();
  } else {
    frame.innerHTML = "";   // stop the WebRTC session on leave
  }
}

function initCamera() {
  document.querySelectorAll(".ptz").forEach(b => b.onclick = () =>
    camPTZ(parseInt(b.dataset.pan, 10), parseInt(b.dataset.tilt, 10)));
  document.querySelectorAll("#step-row .seg").forEach(b => b.onclick = () => {
    CAM.step = parseInt(b.dataset.step, 10);
    document.querySelectorAll("#step-row .seg").forEach(x => x.classList.toggle("active", x === b));
    document.getElementById("ptz-step").textContent = CAM.step + "°";
  });
  document.querySelectorAll("[data-light]").forEach(b => b.onclick = () =>
    camSimple("/cam/light", { on: b.dataset.light === "on" }, `spotlight ${b.dataset.light}`));
  document.querySelectorAll("[data-ir]").forEach(b => b.onclick = () =>
    camSimple("/cam/ir", { mode: b.dataset.ir }, `IR ${b.dataset.ir}`));
  document.getElementById("preset-go").onclick = () => {
    const id = document.getElementById("preset-sel").value;
    if (id) camSimple("/cam/preset", { action: "goto", id }, "recalled preset");
  };
  document.getElementById("preset-save").onclick = () => {
    const name = prompt("Save current position as preset named:");
    if (name) camCtrl("/cam/preset", "POST", { action: "save", name })
      .then(() => { camNote("saved preset “" + name + "”"); camLoadPresets(); })
      .catch(e => camNote(e.message, true));
  };
  document.getElementById("cam-reload").onclick = () => {
    const frame = document.getElementById("cam-frame");
    if (frame) frame.innerHTML = "";   // drop the current session, then rebuild
    camOnView();
  };
  setInterval(camStatus, 6000);
  camOnView();   // honor the restored tab on load
}
initCamera();
</script>
